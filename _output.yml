# POPs/_output.yml  (padrão de PDF para todos os POPs)

pdf_document:
  toc: false             # mude p/ true se quiser sumário no POP
  number_sections: false   # mude p/ true se quiser seções numeradas
  fig_caption: true
  df_print: kable
  keep_tex: false
  header-includes:
    - \usepackage{array}
    - \usepackage{graphicx}
    - \usepackage{booktabs}
    - \usepackage{titling}
    - \setlength{\droptitle}{-5cm}
    - \pretitle{\begin{center}\small\bfseries}
    - \posttitle{\end{center}}
  pandoc_args:
    - "--pdf-engine-opt=-interaction=nonstopmode"
    - "--pdf-engine-opt=-file-line-error"
    - "--highlight-style=breezedark"
    - "-V"
    - "classoption=oneside"
    - "-V"
    - "geometry:top=1cm,bottom=1.3cm,left=1.3cm,right=1.3cm"
  fontsize: 4pt
  extra_dependencies:
      - booktabs
      - xcolor
bookdown::pdf_book:
  number_sections: false
  latex_engine: xelatex
  keep_tex: true
  header-includes:
    - \usepackage{array}
    - \usepackage{graphicx}
    - \usepackage{booktabs}
    - \usepackage{titling}
    - \setlength{\droptitle}{-5cm}
    - \pretitle{\begin{center}\small\bfseries}
    - \posttitle{\end{center}}
  pandoc_args:
    - "-V"
    - "classoption=10pt,oneside"
    - "-V"
    - "geometry:top=1cm,bottom=1.3cm,left=1.3cm,right=1.3cm"
    - "--pdf-engine-opt=-interaction=nonstopmode"
    - "--pdf-engine-opt=-file-line-error"
    - "--highlight-style=breezedark"