bookdown::pdf_book:
  latex_engine: xelatex
  citation_package: natbib
  keep_tex: no
  toc: true
  toc_depth: 3
  number_sections: true
  fig_caption: true
  fig_width: 8
  fig_height: 10
  df_print: kable
  includes:
    in_header: latex/preamble.tex
    before_body: latex/before_body.tex
  template: null
  pandoc_args: [
    "--variable", "classoption=oneside",
    "--variable", "geometry:margin=1.6cm,top=2cm,bottom=2cm",
    "--variable", "papersize=a4paper"
  ]