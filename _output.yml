bookdown::pdf_book:
  latex_engine: xelatex
  citation_package: natbib
  keep_tex: no
  toc: true
  toc_depth: 2
  number_sections: true
  fig_caption: true
  fig_width: 8
  fig_height: 10
  df_print: kable
  includes:
    in_header: latex/preamble.tex
  template: null
  pandoc_args: [
    "--variable", "classoption=oneside",
    "--variable", "geometry:margin=1.6cm,top=1.5cm,bottom=1.5cm,headsep=0.5cm",
    "--variable", "papersize=a4paper",
    "--syntax-highlighting=tango"
  ]